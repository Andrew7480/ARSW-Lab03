syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.welfare.medical";
option java_outer_classname = "MedicalProto";

service MedicalService {
  rpc GetSpecialties (MedicalRequest) returns (SpecialtyList);
}

message MedicalRequest {}

message Specialty {
  int32 id = 1;
  string name = 2;
}

message SpecialtyList {
  repeated Specialty specialties = 1;
}